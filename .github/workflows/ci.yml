name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 1.80.1: version Deno pins in rust-toolchain.toml — expected to pass everywhere
        # 1.94.1: first stable where libc::c_void diverges from winapi::ctypes::c_void — expected to fail on Windows
        rust: ["1.80.1", "1.94.1"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo check
