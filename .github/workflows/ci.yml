name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
          # Demonstrates the bug: winapi::ctypes::c_void != core::ffi::c_void
          - os: windows-latest
            features: ""
          # Demonstrates the workaround: winapi/std makes c_void a type alias
          # for std::os::raw::c_void, resolving the mismatch
          - os: windows-latest
            features: "--features fix"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check ${{ matrix.features }}
