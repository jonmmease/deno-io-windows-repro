name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 0.2.172: version pinned by Deno's Cargo.lock — expected to pass everywhere
        # 0.2.183: introduced c_void re-export change — expected to fail on Windows
        libc: ["0.2.172", "0.2.183"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo update -p libc --precise ${{ matrix.libc }}
      - run: cargo check
